services:
  - type: web
    name: attendai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false        # Set this manually in Render dashboard
      - key: MONGODB_DATABASE
        value: attendance_db
      - key: PYTHON_VERSION
        value: 3.11.0
